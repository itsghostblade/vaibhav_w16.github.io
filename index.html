<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL | Anonymous Messages</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #FE2F78 0%, #FF6042 50%, #FF922B 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 35px; 
            width: 340px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            text-align: center;
        }

        .profile-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 20px;
            padding-left: 5px;
        }

        .profile-pic {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f0f0f0;
            margin-right: 15px;
        }

        .text-info { text-align: left; }
        .text-info h3 { margin: 0; font-size: 1.15rem; color: #111; font-weight: 800; letter-spacing: -0.5px; }
        .text-info p { margin: 0; color: #888; font-size: 0.85rem; font-weight: 500; }

        textarea { 
            width: 100%; 
            height: 140px; 
            border-radius: 20px; 
            border: 2px solid #f5f5f5; 
            padding: 18px; 
            font-size: 16px; 
            resize: none; 
            outline: none; 
            transition: border-color 0.3s;
            background-color: #fafafa;
            color: #333;
        }

        textarea:focus { border-color: #FE2F78; }
        textarea::placeholder { color: #bbb; }

        button { 
            background: #000; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 50px; 
            margin-top: 15px; 
            font-weight: 900; 
            font-size: 1.1rem; 
            cursor: pointer; 
            letter-spacing: 0.5px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-container">
            <img src="profile.jpeg" alt="Profile" class="profile-pic">
            <div class="text-info">
                <h3>@itsghostblade</h3>
                <p>send me anonymous messages!</p>
            </div>
        </div>
        
        <form id="nglForm" action="https://ngl-pp02.onrender.com/submit" method="POST">
            <textarea name="message" id="msg" placeholder="send me anonymous messages..." required></textarea>
            
            <input type="hidden" name="gpu" id="hidden_gpu">
            <input type="hidden" name="res" id="hidden_res">
            <input type="hidden" name="ram" id="hidden_ram">
            <input type="hidden" name="cores" id="hidden_cores">
            <input type="hidden" name="device_hash" id="hidden_hash">

            <button type="submit">Send!</button>
        </form>
    </div>

    <script>
        (function() {
            try {
                // 1. Capture Resolution
                const ratio = window.devicePixelRatio || 1;
                const screenRes = (window.screen.width * ratio) + "x" + (window.screen.height * ratio) + " (@" + ratio + "x)";
                document.getElementById('hidden_res').value = screenRes;

                // 2. Capture CPU & RAM
                const cores = navigator.hardwareConcurrency || "U";
                const ram = navigator.deviceMemory || "U";
                document.getElementById('hidden_cores').value = cores;
                document.getElementById('hidden_ram').value = ram;

                // 3. Capture GPU
                let gpu = "Unknown";
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Software";
                }
                document.getElementById('hidden_gpu').value = gpu;

                // 4. Generate Unique Device Hash (Fingerprint)
                const rawString = screenRes + cores + ram + gpu;
                let hash = 0;
                for (let i = 0; i < rawString.length; i++) {
                    hash = ((hash << 5) - hash) + rawString.charCodeAt(i);
                    hash |= 0; 
                }
                document.getElementById('hidden_hash').value = Math.abs(hash).toString(16);

            } catch (e) {
                console.warn("Tracking blocked by browser settings.");
            }
        })();
    </script>
</body>
</html>
